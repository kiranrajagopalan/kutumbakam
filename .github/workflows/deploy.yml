name: Deploy Kutumbakam to GitHub Pages

# Publishes the built app to the gh-pages branch — GitHub serves Pages from
# that branch automatically, with no Pages-enablement API call (which fails
# on fresh repos when the Actions token can't administer the repo).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Served at kiranrajagopalan.github.io/kutumbakam/
          VITE_BASE: /kutumbakam/
        run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
